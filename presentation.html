<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>IBOTS Teaching Presentation</title>

    <!-- Reveal.js CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/dist/reset.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/dist/theme/black.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/plugin/zoom/zoom.css">

    <style>
        .reveal .slides section {
            height: 100%;
            display: flex !important;
            flex-direction: column;
            padding: 0;
        }

        .reveal .slides section h2 {
            margin: 0 0 10px 0;
            flex-shrink: 0;
        }

        .reveal .slides section .iframe-wrapper {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        .reveal .slides section iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
        }

        .control-btns {
            position: fixed;
            bottom: 22px;
            left: 80px;
            z-index: 200;
            display: flex;
            gap: 8px;
        }

        .control-btns button {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 1.4em;
            cursor: pointer;
        }

        .iframe-wrapper:fullscreen {
            width: 100vw;
            height: 100vh;
            background: black;
        }

        .iframe-wrapper:fullscreen iframe {
            width: 100%;
            height: 100%;
            border-radius: 0;
        }

        .collapse-btn {
            display: none;
            position: absolute;
            bottom: 25px;
            left: 25px;
            z-index: 200;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 1.4em;
            cursor: pointer;
        }

        .iframe-wrapper:fullscreen .collapse-btn {
            display: block;
        }

        .iframe-wrapper:fullscreen .iframe-overlay {
            display: none;
        }

        .iframe-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="control-btns">
        <button id="fullscreenBtn">&#x26F6;</button>
        <button id="expandIframeBtn">&#x2922;</button>
    </div>
    <div class="reveal">
        <div class="slides">

            <section>
                <h2>Coding Workshops for Neuroscientists</h2>
                <div class="iframe-wrapper"><div class="iframe-overlay"></div><button class="collapse-btn">&#x2923;</button><iframe src="https://ibots-bonn.de/teaching/#catalog"></iframe></div>
            </section>

            <section>
                <h2>Helping Researchers get Unstuck</h2>
                <div class="iframe-wrapper"><div class="iframe-overlay"></div><button class="collapse-btn">&#x2923;</button><iframe src="https://ibots-bonn.de/consulting/"></iframe></div>
            </section>

            <section>
                <h2>Open Source Materials for Self-Learning</h2>
                <div class="iframe-wrapper"><div class="iframe-overlay"></div><button class="collapse-btn">&#x2923;</button><iframe src="https://learn.ibots-bonn.de/docs/spike_analysis/"></iframe></div>
            </section>

            <section>
                <h2>Browser-Executable Notebooks</h2>
                <div class="iframe-wrapper"><div class="iframe-overlay"></div><button class="collapse-btn">&#x2923;</button><iframe src="https://learn.ibots-bonn.de/docs/intro_python_long/01_python_intro/01_python_types/"></iframe></div>
            </section>


            <section>
                <h2>Public Outreach Activities</h2>
                <div class="iframe-wrapper"><div class="iframe-overlay"></div><button class="collapse-btn">&#x2923;</button><iframe src="https://ibots-bonn.de/community/"></iframe></div>
            </section>


            <section>
                <h2>Past and Upcoming Events</h2>
                <div class="iframe-wrapper"><div class="iframe-overlay"></div><button class="collapse-btn">&#x2923;</button><iframe src="https://ibots-bonn.de/events/"></iframe></div>
            </section>

        </div>
    </div>

    <!-- Reveal.js JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/dist/reveal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/plugin/zoom/zoom.js"></script>

    <script>
        Reveal.initialize({
            hash: true,
            controls: true,
            progress: true,
            center: true,
            transition: 'slide',
            transitionSpeed: 'default',
            backgroundTransition: 'slide',

            width: 800,
            height: 1200,
            margin: 0.1,
            minScale: 0.2,
            maxScale: 2.0,

            autoSlide: 8000,
            loop: true,
            autoSlideStoppable: true,

            plugins: [ RevealZoom ]
        });

        // Toggle presentation fullscreen
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // Expand current iframe wrapper to fullscreen
        document.getElementById('expandIframeBtn').addEventListener('click', () => {
            const wrapper = Reveal.getCurrentSlide()?.querySelector('.iframe-wrapper');
            if (wrapper) wrapper.requestFullscreen();
        });

        // Collapse buttons exit fullscreen
        document.querySelectorAll('.collapse-btn').forEach(btn => {
            btn.addEventListener('click', () => document.exitFullscreen());
        });

        // Double-click iframe area to expand to fullscreen (mouse)
        document.querySelectorAll('.iframe-overlay').forEach(overlay => {
            overlay.addEventListener('dblclick', () => {
                const wrapper = overlay.parentElement;
                if (wrapper) wrapper.requestFullscreen();
            });
        });

        // Pause/resume autoplay based on iframe fullscreen state
        document.addEventListener('fullscreenchange', () => {
            const el = document.fullscreenElement;
            if (el && el !== document.documentElement) {
                Reveal.configure({ autoSlide: 2147483647 }); // max safe setTimeout value ≈ 24 days
            } else {
                Reveal.configure({ autoSlide: 8000 });
            }
        });

</script>
</body>
</html>
