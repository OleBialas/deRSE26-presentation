<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>IBOTS Teaching Presentation</title>

    <!-- Reveal.js CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/dist/reset.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/dist/theme/black.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/plugin/zoom/zoom.css">

    <style>
        .reveal .slides section {
            height: 100%;
            display: flex !important;
            flex-direction: column;
            padding: 0;
        }

        .reveal .slides section h2 {
            margin: 0 0 10px 0;
            flex-shrink: 0;
        }

        .reveal .slides section .iframe-wrapper {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        .reveal .slides section iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
        }

        .iframe-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="reveal">
        <div class="slides">

            <section>
                <h2>Online Courses Combining Programming and Neuroscience</h2>
                <div class="iframe-wrapper"><div class="iframe-overlay"></div><iframe src="https://ibots-bonn.de/teaching/#catalog"></iframe></div>
            </section>

            <section>
                <h2>Helping Researchers get Unstuck</h2>
                <div class="iframe-wrapper"><div class="iframe-overlay"></div><iframe src="https://ibots-bonn.de/consulting/"></iframe></div>
            </section>

            <section>
                <h2>Open Source Materials for Self-Learning</h2>
                <div class="iframe-wrapper"><div class="iframe-overlay"></div><iframe src="https://learn.ibots-bonn.de/docs/spike_analysis/"></iframe></div>
            </section>

            <section>
                <h2>Browser-Executable Notebooks Powered by Pyodide</h2>
                <div class="iframe-wrapper"><div class="iframe-overlay"></div><iframe src="https://learn.ibots-bonn.de/docs/intro_python_long/01_python_intro/01_python_types/"></iframe></div>
            </section>

            <section data-background-iframe="https://ibots-bonn.de/community/"
                     data-background-interactive
                     data-clip-width="0"
                     data-clip-bottom="0">
            </section>
            
            
            <section data-background-iframe="https://ibots-bonn.de/events/"
                     data-background-interactive
                     data-clip-width="0"
                     data-clip-bottom="0">
            </section>

        </div>
    </div>

    <!-- Reveal.js JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/dist/reveal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/plugin/zoom/zoom.js"></script>

    <script>
        Reveal.initialize({
            hash: true,
            controls: true,
            progress: true,
            center: true,
            transition: 'slide',
            transitionSpeed: 'default',
            backgroundTransition: 'slide',

            width: 800,
            height: 1200,
            margin: 0.1,
            minScale: 0.2,
            maxScale: 2.0,

            autoSlide: 15000,
            loop: true,
            autoSlideStoppable: true,

            plugins: [ RevealZoom ]
        });

        // Double-click iframe area to expand to fullscreen
        document.querySelectorAll('.iframe-overlay').forEach(overlay => {
            overlay.addEventListener('dblclick', () => {
                const iframe = overlay.parentElement.querySelector('iframe');
                if (iframe) iframe.requestFullscreen();
            });
        });
    </script>
</body>
</html>
